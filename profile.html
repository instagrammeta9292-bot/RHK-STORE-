<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - RHK</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

.header{
padding:20px;
font-size:28px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #333;
}

.profile{
padding:20px;
text-align:center;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #00ff88;
}

.name{
font-size:24px;
margin-top:15px;
font-weight:bold;
}

.username{
color:#aaa;
margin-top:5px;
}

.bio{
margin-top:15px;
font-size:15px;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:25px;
}

.stats div{
text-align:center;
}

.stats h2{
font-size:22px;
}

.edit{
margin-top:20px;
padding:12px;
width:100%;
background:#00c853;
border:none;
color:#fff;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

.posts{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:30px;
}

.posts img{
width:100%;
aspect-ratio:1;
object-fit:cover;
background:#222;
}
</style>

</head>
<body>

<div class="header">RHK Profile</div>

<div class="profile">

<img id="photo" src="https://via.placeholder.com/150">

<div class="name" id="fullname">Loading...</div>

<div class="username" id="username">@username</div>

<div class="bio" id="bio"></div>

<div class="stats">

<div>
<h2 id="postsCount">0</h2>
<p>Posts</p>
</div>

<div>
<h2>0</h2>
<p>Followers</p>
</div>

<div>
<h2>0</h2>
<p>Following</p>
</div>

</div>

<button class="edit">
Edit Profile
</button>

<div class="posts" id="postsGrid">

</div>

</div>

<script>

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_PROJECT.appspot.com",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

auth.onAuthStateChanged(async(user)=>{

if(!user){
location="index.html";
return;
}

const doc=await db.collection("users").doc(user.uid).get();

if(doc.exists){

const d=doc.data();

fullname.innerHTML=d.fullname;
username.innerHTML="@"+d.username;
bio.innerHTML=d.bio;

if(d.photo){
photo.src=d.photo;
}

}

});

</script>

</body>
</html>

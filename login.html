<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RHK Login</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="login-box">

        <!-- RHK Logo -->
        <div class="logo">

            <div class="logo-circle">
                <span>RHK</span>
            </div>

            <h1>RHK</h1>

            <p>Welcome Back</p>

        </div>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Username or Email"
                required
            >

            <div class="password-box">

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button
                    type="button"
                    id="togglePassword"
                >
                    👁
                </button>

            </div>

            <button
                class="login-btn"
                type="submit"
            >
                Log In
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <a class="forgot" href="#">
            Forgot Password?
        </a>

    </div>

    <div class="signup-box">

        Don't have an account?

        <a href="signup.html">
            Sign Up
        </a>

    </div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>

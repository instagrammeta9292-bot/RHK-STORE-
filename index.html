<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Authentication</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <!-- Main Container -->
  <div class="w-full max-w-sm bg-[#121212] border border-[#262626] rounded-xl p-8 space-y-6 shadow-2xl">
    
    <!-- Brand Header -->
    <div class="text-center space-y-2">
      <h1 class="text-4xl font-extrabold tracking-wider bg-gradient-to-r from-purple-500 via-pink-500 to-orange-500 bg-clip-text text-transparent">
        RHK
      </h1>
      <p class="text-sm text-[#a8a8a8]" id="flow-subtitle">Connect and style your world</p>
    </div>

    <!-- Error Toast -->
    <div id="error-message" class="hidden text-xs bg-red-950/50 border border-red-800 text-red-400 p-3 rounded-lg text-center"></div>

    <!-- VIEW 1: LOGIN PAGE -->
    <div id="login-view" class="space-y-6">
      <div class="flex justify-center py-4">
        <!-- Minimalistic Visual Asset -->
        <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 flex items-center justify-center opacity-90 shadow-lg">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
        </div>
      </div>
      
      <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-white text-black font-semibold py-3 px-4 rounded-lg hover:bg-[#e6e6e6] transition duration-200 shadow-md">
        <!-- Google Icon SVG -->
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="text-center text-xs text-[#737373]">
        By signing up, you agree to our Terms and Privacy Policy.
      </div>
    </div>

    <!-- VIEW 2: CREATE PROFILE PAGE (Hidden Initially) -->
    <div id="profile-view" class="hidden space-y-5">
      <form id="profile-form" class="space-y-4">
        <!-- Hidden input to store UID -->
        <input type="hidden" id="user-uid">
        
        <div>
          <label class="block text-xs font-semibold text-[#a8a8a8] uppercase tracking-wider mb-1.5" for="username">Username</label>
          <input type="text" id="username" required placeholder="@username" 
            class="w-full bg-[#1c1c1e] border border-[#262626] rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#555] placeholder-[#48484a] transition">
        </div>

        <div>
          <label class="block text-xs font-semibold text-[#a8a8a8] uppercase tracking-wider mb-1.5" for="fullName">Full Name</label>
          <input type="text" id="fullName" required placeholder="Your display name" 
            class="w-full bg-[#1c1c1e] border border-[#262626] rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#555] placeholder-[#48484a] transition">
        </div>

        <div>
          <label class="block text-xs font-semibold text-[#a8a8a8] uppercase tracking-wider mb-1.5" for="bio">Bio</label>
          <textarea id="bio" rows="3" placeholder="Tell the community about your style..." 
            class="w-full bg-[#1c1c1e] border border-[#262626] rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-[#555] placeholder-[#48484a] resize-none transition"></textarea>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-500 text-white font-semibold py-3 px-4 rounded-lg hover:opacity-90 transition duration-200 shadow-md">
          Complete Profile
        </button>
      </form>
    </div>

  </div>

  <!-- Firebase v10 SDK Modules via CDN -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Provided Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAHUju18VBAdDFoQJhsVWp7oUqBxhfwThE",
      authDomain: "rhk-app-e34c6.firebaseapp.com",
      projectId: "rhk-app-e34c6",
      storageBucket: "rhk-app-e34c6.firebasestorage.app",
      messagingSenderId: "1016565109006",
      appId: "1:1016565109006:web:eb7ec260a601a16e5ac75f",
      measurementId: "G-814PTRRQVQ"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // DOM Elements
    const loginView = document.getElementById('login-view');
    const profileView = document.getElementById('profile-view');
    const flowSubtitle = document.getElementById('flow-subtitle');
    const errorMessage = document.getElementById('error-message');
    
    const googleLoginBtn = document.getElementById('google-login-btn');
    const profileForm = document.getElementById('profile-form');
    const userUidInput = document.getElementById('user-uid');
    const fullNameInput = document.getElementById('fullName');

    // Display error messages gently
    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.remove('hidden');
    }

    // Step 1: Handle Google Sign-In
    googleLoginBtn.addEventListener('click', async () => {
      errorMessage.classList.add('hidden');
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        // Check if user already exists in Firestore database
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          // User already completed setup, proceed to Home
          navigateToHome();
        } else {
          // New User: Proceed to Profile setup
          userUidInput.value = user.uid;
          fullNameInput.value = user.displayName || "";
          switchToProfileView();
        }
      } catch (error) {
        console.error("Authentication Error: ", error);
        showError("Authentication failed. Please try again.");
      }
    });

    // View Switch Logic
    function switchToProfileView() {
      loginView.classList.add('hidden');
      profileView.classList.remove('hidden');
      flowSubtitle.textContent = "Complete your setup";
    }

    function navigateToHome() {
      // Temporary confirmation text to replace view
      document.querySelector('.w-full.max-w-sm').innerHTML = `
        <div class="text-center space-y-4 py-8">
          <div class="text-5xl">🎉</div>
          <h2 class="text-2xl font-bold">Welcome to RHK!</h2>
          <p class="text-sm text-[#a8a8a8]">Redirecting you to the home page...</p>
        </div>
      `;
      // Here you will use window.location.href = "/home.html";
    }

    // Step 2: Handle Profile Creation Submission
    profileForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.classList.add('hidden');

      const uid = userUidInput.value;
      const username = document.getElementById('username').value.trim().toLowerCase();
      const fullName = fullNameInput.value.trim();
      const bio = document.getElementById('bio').value.trim();

      if (!uid) {
        showError("Session expired. Please refresh and log in again.");
        return;
      }

      try {
        // Save user profile settings to Firestore
        await setDoc(doc(db, "users", uid), {
          username: username.startsWith('@') ? username : `@${username}`,
          fullName: fullName,
          bio: bio,
          email: auth.currentUser.email,
          createdAt: new Date().toISOString()
        });

        // Redirect/Go to home page
        navigateToHome();
      } catch (error) {
        console.error("Firestore Saving Error: ", error);
        showError("Failed to save profile details. Try again.");
      }
    });
  </script>
</body>
</html>

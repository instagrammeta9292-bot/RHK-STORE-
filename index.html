<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RHK Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="login-card">

<div class="logo">

<div class="logo-circle">
RHK
</div>

<h1>RHK</h1>

<p>Connect with friends and the world.</p>

</div>

<form id="loginForm">

<div class="input-group">

<input
type="email"
id="email"
placeholder="Email"
required
>

</div>

<div class="input-group">

<input
type="password"
id="password"
placeholder="Password"
required
>

<span id="togglePassword">
👁
</span>

</div>

<button
type="submit"
class="login-btn">
Log In
</button>

</form>

<div class="divider">

<span>OR</span>

</div>

<button
id="googleLogin"
class="google-btn">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
width="20">

Continue with Google

</button>

<p class="signup">

Don't have an account?

<a href="signup.html">

Sign Up

</a>

</p>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>

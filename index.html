<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h2>Welcome back</h2>
      <p>Please enter your details to sign in.</p>
    </div>

    <!-- Error/Success Alerts -->
    <div id="auth-message" class="alert hidden"></div>

    <!-- Google Login Button -->
    <button type="button" id="google-btn" class="google-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l.003-.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider">
      <span>or</span>
    </div>

    <!-- Email/Password Form -->
    <form id="login-form" class="login-form">
      <div class="input-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="input-group">
        <div class="password-label-row">
          <label for="password">Password</label>
          <a href="#" id="forgot-pass-btn" class="forgot-password">Forgot?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="submit-btn">Sign in</button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a href="#" id="signup-toggle">Sign up</a></p>
    </div>
  </div>

  <!-- JavaScript Integration -->
  <script type="module" src="app.js"></script>
</body>
</html>

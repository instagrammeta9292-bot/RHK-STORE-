<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RHK Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
}

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 20px;

background:white;

box-shadow:0 2px 10px rgba(0,0,0,.1);

position:sticky;

top:0;

}

.logo{

font-size:28px;

font-weight:700;

background:linear-gradient(45deg,#FCAF45,#FD1D1D,#C13584,#405DE6);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.profile{

display:flex;

align-items:center;

gap:12px;

}

.profile img{

width:45px;

height:45px;

border-radius:50%;

}

.container{

padding:20px;

text-align:center;

}

.card{

background:white;

padding:25px;

border-radius:20px;

max-width:420px;

margin:auto;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}

.card h2{

margin:15px 0;

}

.card p{

margin:8px 0;

color:#666;

}

button{

margin-top:25px;

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#ff3b30;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

}

button:hover{

background:#e1281e;

}

</style>

</head>

<body>

<header>

<div class="logo">

RHK

</div>

<div class="profile">

<img id="photo">

</div>

</header>

<div class="container">

<div class="card">

<img id="photo2"
width="100"
height="100"
style="border-radius:50%;">

<h2 id="name">

Loading...

</h2>

<p id="username">

</p>

<p id="email">

</p>

<button id="logout">

Logout

</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {

getAuth,

onAuthStateChanged,

signOut

}

from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

import {

getFirestore,

doc,

getDoc

}

from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyAHUju18VBAdDFoQJhsVWp7oUqBxhfwThE",

authDomain:"rhk-app-e34c6.firebaseapp.com",

projectId:"rhk-app-e34c6",

storageBucket:"rhk-app-e34c6.firebasestorage.app",

messagingSenderId:"1016565109006",

appId:"1:1016565109006:web:eb7ec260a601a16e5ac75f",

measurementId:"G-814PTRRQVQ"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href="index.html";

return;

}

const snap=await getDoc(doc(db,"users",user.uid));

if(snap.exists()){

const data=snap.data();

document.getElementById("photo").src=data.photo;

document.getElementById("photo2").src=data.photo;

document.getElementById("name").innerText=data.name;

document.getElementById("username").innerText="@"+data.username;

document.getElementById("email").innerText=data.email;

}

});

document.getElementById("logout").onclick=async()=>{

await signOut(auth);

window.location.href="index.html";

};

</script>

</body>
</html>

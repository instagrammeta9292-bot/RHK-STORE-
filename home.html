<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RHK Home</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#fafafa;
}

header{
height:70px;
background:white;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
position:sticky;
top:0;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.circle{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
font-size:18px;
}

.logo h2{
color:#333;
}

.container{
padding:25px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
text-align:center;
max-width:500px;
margin:auto;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#ddd;
margin:auto;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
font-weight:bold;
margin-bottom:15px;
}

button{
padding:12px 25px;
border:none;
background:#0095f6;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:20px;
}

button:hover{
background:#0077d9;
}

</style>

</head>

<body>

<header>

<div class="logo">

<div class="circle">
RHK
</div>

<h2>RHK</h2>

</div>

</header>

<div class="container">

<div class="card">

<div class="avatar" id="avatar">
R
</div>

<h2 id="name">Loading...</h2>

<p id="username">@loading</p>

<button id="logoutBtn">
Logout
</button>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

import {
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const name=document.getElementById("name");
const username=document.getElementById("username");
const avatar=document.getElementById("avatar");

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

const snap=await getDoc(doc(db,"users",user.uid));

if(snap.exists()){

const data=snap.data();

name.innerHTML=data.name;

username.innerHTML="@"+data.username;

avatar.innerHTML=data.name.charAt(0).toUpperCase();

}

});

document.getElementById("logoutBtn").onclick=async()=>{

await signOut(auth);

window.location.href="login.html";

};

</script>

</body>
</html>

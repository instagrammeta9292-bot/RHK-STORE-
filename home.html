<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding-bottom:80px;
}

header{

position:fixed;
top:0;
left:0;
right:0;

height:60px;

background:#000;

display:flex;

justify-content:center;

align-items:center;

font-size:32px;

font-weight:bold;

border-bottom:1px solid #222;

z-index:1000;

}

.feed{

margin-top:70px;

}

.post{

background:#111;

margin-bottom:15px;

}

.post-header{

display:flex;

align-items:center;

padding:12px;

}

.post-header img{

width:45px;

height:45px;

border-radius:50%;

margin-right:10px;

object-fit:cover;

}

.username{

font-size:18px;

font-weight:bold;

}

.post-image{

width:100%;

display:block;

}

.caption{

padding:12px;

font-size:16px;

}

.actions{

display:flex;

padding:10px;

font-size:26px;

gap:20px;

}

.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:65px;

background:#111;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid #333;

}

.bottom-nav a{

color:white;

text-decoration:none;

font-size:14px;

text-align:center;

}

.bottom-nav a:hover{

color:#00ff88;

}

</style>

</head>

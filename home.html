<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RHK</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding-bottom:80px;
}

header{

position:fixed;
top:0;
left:0;
right:0;

height:60px;

background:#000;

display:flex;

justify-content:center;

align-items:center;

font-size:32px;

font-weight:bold;

border-bottom:1px solid #222;

z-index:1000;

}

.feed{

margin-top:70px;

}

.post{

background:#111;

margin-bottom:15px;

}

.post-header{

display:flex;

align-items:center;

padding:12px;

}

.post-header img{

width:45px;

height:45px;

border-radius:50%;

margin-right:10px;

object-fit:cover;

}

.username{

font-size:18px;

font-weight:bold;

}

.post-image{

width:100%;

display:block;

}

.caption{

padding:12px;

font-size:16px;

}

.actions{

display:flex;

padding:10px;

font-size:26px;

gap:20px;

}

.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:65px;

background:#111;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid #333;

}

.bottom-nav a{

color:white;

text-decoration:none;

font-size:14px;

text-align:center;

}

.bottom-nav a:hover{

color:#00ff88;

}

</style>

</head>

<body>

<header>

RHK

</header>

<div id="feed" class="feed">

</div>

<nav class="bottom-nav">

<a href="home.html">
🏠<br>Home
</a>

<a href="search.html">
🔍<br>Search
</a>

<a href="upload.html">
➕<br>Upload
</a>

<a href="notifications.html">
❤️<br>Activity
</a>

<a href="profile.html">
👤<br>Profile
</a>

</nav>
  <script>

// ==========================
// Firebase Config
// Replace with YOUR Firebase config
// ==========================

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAHUju18VBAdDFoQJhsVWp7oUqBxhfwThE",
  authDomain: "rhk-app-e34c6.firebaseapp.com",
  projectId: "rhk-app-e34c6",
  storageBucket: "rhk-app-e34c6.firebasestorage.app",
  messagingSenderId: "1016565109006",
  appId: "1:1016565109006:web:eb7ec260a601a16e5ac75f",
  measurementId: "G-814PTRRQVQ"
};
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

// ==========================
// Check Login
// ==========================

auth.onAuthStateChanged(async(user)=>{

    if(!user){

        window.location="index.html";
        return;

    }

    loadPosts();

});

// ==========================
// Load Feed
// ==========================

async function loadPosts(){

    const feed=document.getElementById("feed");

    feed.innerHTML="";

    const snapshot=await db.collection("posts")
    .orderBy("createdAt","desc")
    .get();

    snapshot.forEach(doc=>{

        const post=doc.data();

        feed.innerHTML+=`

        <div class="post">

            <div class="post-header">

                <img src="${post.photo || 'https://via.placeholder.com/50'}">

                <div>

                    <div class="username">

                        ${post.username}

                    </div>

                    <small>

                        ${post.fullname}

                    </small>

                </div>

            </div>

            <img
            class="post-image"
            src="${post.imageUrl}">

            <div class="actions">

                ❤️ 🤍 💬 📤

            </div>

            <div class="caption">

                <b>@${post.username}</b>

                ${post.caption}

            </div>

        </div>

        `;

    });

}

</script>

</body>
</html>

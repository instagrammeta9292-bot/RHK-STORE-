<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Create Profile • RHK</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-box{

width:100%;
max-width:420px;

padding:35px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:24px;

border:1px solid rgba(255,255,255,.25);

box-shadow:0 20px 40px rgba(0,0,0,.25);

text-align:center;

position:relative;
z-index:10;

}

.profile-box input{

width:100%;

padding:15px;

margin-top:15px;

border:none;

outline:none;

border-radius:12px;

font-size:15px;

}

.profile-box button{

width:100%;

margin-top:20px;

padding:15px;

border:none;

border-radius:12px;

font-size:16px;

font-weight:600;

cursor:pointer;

background:#0095f6;

color:white;

}

.profile-box button:hover{

background:#0078e7;

}

.small{

margin-top:10px;

color:white;

font-size:13px;

}

</style>

</head>

<body>

<div class="background"></div>

<div class="profile-box">

<div class="logo">

<div class="logo-circle">

RHK

</div>

<h1>Create Profile</h1>

<p>Choose your unique RHK username</p>

</div>

<form id="profileForm">

<input
type="text"
id="username"
placeholder="Username"
required>

<input
type="text"
id="name"
placeholder="Display Name"
required>

<button type="submit">

Continue

</button>

</form>

<p class="small">

This can only be changed later from settings.

</p>

</div>

<script type="module" src="create-profile.js"></script>

</body>
</html>

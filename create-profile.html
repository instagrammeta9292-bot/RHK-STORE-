<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Profile | RHK</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:360px;
background:#1b1b1b;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,255,170,.2);
text-align:center;
}

.logo{
font-size:45px;
font-weight:bold;
color:#00ff88;
margin-bottom:10px;
}

.subtitle{
color:#bbb;
margin-bottom:25px;
}

input,textarea{
width:100%;
padding:14px;
margin-top:15px;
border:none;
outline:none;
border-radius:10px;
background:#2d2d2d;
color:white;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00b248;
}

#msg{
margin-top:15px;
color:#ff5252;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">RHK</div>

<div class="subtitle">
Complete your profile
</div>

<input
type="text"
id="username"
placeholder="Username">

<input
type="text"
id="fullname"
placeholder="Full Name">

<textarea
id="bio"
placeholder="Write a short bio"></textarea>

<button onclick="saveProfile()">
Continue
</button>

<p id="msg"></p>

</div>

<script src="profile.js"></script>

</body>
</html>
